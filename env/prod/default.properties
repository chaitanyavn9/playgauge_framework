# ─── playgauge_framework — PROD environment ──────────────────────────────────
# Run: GAUGE_ENV=prod gauge run specs/ --tags smoke
# WARNING: Only smoke tests should run against production.

ENV_NAME          = prod
BASE_URL          = https://www.example.com
PORT              =
API_BASE_URL      = https://api.example.com

# Prod credentials — inject via CI secrets, never hardcode here
USERNAME          = ${PROD_USERNAME}
PASSWORD          = ${PROD_PASSWORD}

# Page URLs
PAGE_LOGIN        = /login
PAGE_DASHBOARD    = /dashboard
PAGE_USERS        = /admin/users
PAGE_REPORTS      = /reports
PAGE_SETTINGS     = /settings

# API Endpoints
LOGIN_API         = /api/v1/auth/login
USER_LIST_API     = /api/v1/users
USER_DETAIL_API   = /api/v1/users/{id}
LOGOUT_API        = /api/v1/auth/logout
HEALTH_CHECK_API  = /api/v1/health

# Browser
HEADLESS          = true
BROWSER           = chromium

# Observability (tighter threshold in prod)
SLOW_API_THRESHOLD_MS = 2000
OBS_DETAIL_LIMIT      = 20
