# ─── playgauge_framework — DEFAULT environment properties ────────────────────
# These are base defaults. Environment-specific files override these values.
# Gauge merges default/ with the active env folder (e.g. dev/).

# gauge-ts step implementation directory (prevents gauge from scanning db/, ai-analyzer/, etc.)
STEP_IMPL_DIR     = tests/step-implementations

# Application
BASE_URL          = https://example.com
PORT              =
ENV_NAME          = default

# Credentials
USERNAME          = admin
PASSWORD          = admin123

# Page URLs (relative paths appended to BASE_URL)
PAGE_LOGIN        = /login
PAGE_DASHBOARD    = /dashboard
PAGE_USERS        = /admin/users
PAGE_REPORTS      = /reports
PAGE_SETTINGS     = /settings

# API Endpoints
API_BASE_URL      = https://api.example.com
LOGIN_API         = /api/v1/auth/login
USER_LIST_API     = /api/v1/users
USER_DETAIL_API   = /api/v1/users/{id}
LOGOUT_API        = /api/v1/auth/logout
HEALTH_CHECK_API  = /api/v1/health

# Browser
HEADLESS          = true
BROWSER           = chromium

# Observability
OBSERVABILITY_ENABLED       = true
OBSERVABILITY_ATTACH_ALLURE = false
SLOW_API_THRESHOLD_MS       = 1500
OBS_DETAIL_LIMIT            = 20
OBS_API_PATH_REGEX          = (/api/|/rest/|/v1/|/v2/)

# Reporting
ALLURE_RESULTS_DIR = allure-results
SCREENSHOT_DIR     = dist/screenshots

# ─── AI Provider ──────────────────────────────────────────────────────────
# AI_PROVIDER selects the LLM backend for failure analysis.
# Supported values:
#   anthropic          → Anthropic Claude  (requires: @anthropic-ai/sdk — pre-installed)
#   openai             → OpenAI GPT-4o etc (requires: npm install openai)
#   gemini             → Google Gemini     (requires: npm install @google/generative-ai)
#   openai-compatible  → Groq / Together / Ollama / Azure / Mistral etc
#                        (requires: npm install openai  +  set AI_BASE_URL)
#
# AI_API_KEY is read from process.env.AI_API_KEY (set via .env or CI secret).
# AI_MODEL   is optional — each provider has a sensible default.
# AI_BASE_URL is required only for openai-compatible.

AI_PROVIDER   = openai
AI_MODEL      =
AI_BASE_URL   =

# ─── Database (PostgreSQL) ─────────────────────────────────────────────────
# Set DB_ENABLED=false for local runs — no Postgres install required.
# Set DB_ENABLED=true only in CI/CD testrunner environments.
DB_ENABLED         = false
DB_HOST            = localhost
DB_PORT            = 5432
DB_NAME            = playgauge
DB_USER            = playgauge_user
DB_PASSWORD        = playgauge_pass
DB_POOL_MAX        = 5

# ─── Grafana ──────────────────────────────────────────────────────────────
# GRAFANA_ENABLED is only meaningful on a testrunner where Grafana is installed.
GRAFANA_ENABLED    = false
GRAFANA_URL        = http://localhost:3001
