# ─── playgauge_framework — STAGING environment ───────────────────────────────
# Run: GAUGE_ENV=staging gauge run specs/

ENV_NAME          = staging
BASE_URL          = https://staging.example.com
PORT              =
API_BASE_URL      = https://api.staging.example.com

# Staging credentials
USERNAME          = staging_user
PASSWORD          = staging_password_456

# Page URLs
PAGE_LOGIN        = /login
PAGE_DASHBOARD    = /dashboard
PAGE_USERS        = /admin/users
PAGE_REPORTS      = /reports
PAGE_SETTINGS     = /settings

# API Endpoints
LOGIN_API         = /api/v1/auth/login
USER_LIST_API     = /api/v1/users
USER_DETAIL_API   = /api/v1/users/{id}
LOGOUT_API        = /api/v1/auth/logout
HEALTH_CHECK_API  = /api/v1/health

# Browser (headless in staging CI)
HEADLESS          = true
BROWSER           = chromium

# Observability
SLOW_API_THRESHOLD_MS = 1500
OBS_DETAIL_LIMIT      = 30

# Database — enabled on testrunner/CI
DB_ENABLED            = true
DB_HOST               = ${POSTGRES_HOST}
DB_PORT               = 5432
DB_NAME               = playgauge
DB_USER               = ${POSTGRES_USER}
DB_PASSWORD           = ${POSTGRES_PASSWORD}

# Grafana — enabled on testrunner
GRAFANA_ENABLED       = true
GRAFANA_URL           = ${GRAFANA_URL}
