# ─── playgauge_framework — DEV environment ───────────────────────────────────
# Run: GAUGE_ENV=dev gauge run specs/

ENV_NAME          = dev
BASE_URL          = https://dev.example.com
PORT              = 3000
API_BASE_URL      = https://api.dev.example.com

# Dev credentials
USERNAME          = dev_user
PASSWORD          = dev_password_123

# Page URLs
PAGE_LOGIN        = /login
PAGE_DASHBOARD    = /dashboard
PAGE_USERS        = /admin/users
PAGE_REPORTS      = /reports
PAGE_SETTINGS     = /settings

# API Endpoints
LOGIN_API         = /api/v1/auth/login
USER_LIST_API     = /api/v1/users
USER_DETAIL_API   = /api/v1/users/{id}
LOGOUT_API        = /api/v1/auth/logout
HEALTH_CHECK_API  = /api/v1/health

# Browser (non-headless for easier dev debugging)
HEADLESS          = false
BROWSER           = chromium

# Observability (more verbose in dev)
SLOW_API_THRESHOLD_MS       = 1000
OBS_DETAIL_LIMIT            = 50
