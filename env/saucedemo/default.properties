# ─── SauceDemo environment ────────────────────────────────────────────────────
# Run: GAUGE_ENV=saucedemo gauge run specs/saucedemo/
# Public demo app — credentials are fixed by SauceDemo

ENV_NAME          = saucedemo
BASE_URL          = https://www.saucedemo.com
PORT              =
API_BASE_URL      = https://www.saucedemo.com

# Test users (all built-in to SauceDemo)
USERNAME          = standard_user
PASSWORD          = secret_sauce
LOCKED_USER       = locked_out_user
PROBLEM_USER      = problem_user
PERF_GLITCH_USER  = performance_glitch_user

# Pages
PAGE_LOGIN        = /
PAGE_DASHBOARD    = /inventory.html
PAGE_CART         = /cart.html
PAGE_CHECKOUT_1   = /checkout-step-one.html
PAGE_CHECKOUT_2   = /checkout-step-two.html
PAGE_COMPLETE     = /checkout-complete.html

# No real API endpoints on SauceDemo
LOGIN_API         =
USER_LIST_API     =
HEALTH_CHECK_API  =

HEADLESS          = true
BROWSER           = chromium
SLOW_API_THRESHOLD_MS = 2000

# Observability — enable Allure attachments for local runs
OBSERVABILITY_ATTACH_ALLURE = true

# Local run — no DB or Grafana needed
DB_ENABLED        = false
GRAFANA_ENABLED   = false
