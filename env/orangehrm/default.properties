# ─── OrangeHRM Demo environment ───────────────────────────────────────────────
# Run: GAUGE_ENV=orangehrm gauge run specs/orangehrm/
# Public demo: https://opensource-demo.orangehrmlive.com

ENV_NAME          = orangehrm
BASE_URL          = https://opensource-demo.orangehrmlive.com
PORT              =
API_BASE_URL      = https://opensource-demo.orangehrmlive.com

# Default demo credentials
USERNAME          = Admin
PASSWORD          = admin123

# Pages
PAGE_LOGIN        = /web/index.php/auth/login
PAGE_DASHBOARD    = /web/index.php/dashboard/index
PAGE_USERS        = /web/index.php/admin/viewSystemUsers
PAGE_EMPLOYEE     = /web/index.php/pim/viewEmployeeList
PAGE_LEAVE        = /web/index.php/leave/viewLeaveList
PAGE_REPORTS      = /web/index.php/report/accessReports

# API
LOGIN_API         = /web/index.php/auth/login
USER_LIST_API     = /web/index.php/api/v2/admin/users
HEALTH_CHECK_API  = /web/index.php/api/v2/core/release

HEADLESS          = false
BROWSER           = chromium
SLOW_API_THRESHOLD_MS = 3000

# Local run — no DB or Grafana needed
DB_ENABLED        = false
GRAFANA_ENABLED   = false
