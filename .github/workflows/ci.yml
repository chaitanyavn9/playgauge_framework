name: playgauge_framework CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly regression run at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'saucedemo'
        type: choice
        options: [ saucedemo, dev, staging, prod ]
      tags:
        description: 'Gauge tags to run (e.g. smoke or regression)'
        required: false
        default: 'smoke'
      specs:
        description: 'Specs folder to run'
        required: false
        default: 'specs/saucedemo/'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NODE_VERSION: '22'
  GAUGE_ENV: ${{ github.event.inputs.environment || 'saucedemo' }}

jobs:
  # ─── Lint & TypeCheck ──────────────────────────────────────────────────────
  quality:
    name: TypeCheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ─── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests (${{ github.event.inputs.environment || 'saucedemo' }})
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       playgauge_db
          POSTGRES_USER:     playgauge_user
          POSTGRES_PASSWORD: ci_password
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install Gauge
        run: |
          curl -SsL https://downloads.gauge.org/stable | sh
          export PATH=$PATH:/usr/local/bin
          gauge install ts
          gauge install html-report

      # ── Allure Trend: restore history from the previous CI run ─────────────
      # This is what makes the Trend chart build across runs.
      # On first-ever run this step is skipped gracefully (no artifact yet).
      - name: Restore Allure history (for Trend)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true      # first run — no history artifact yet
        with:
          name: allure-history
          path: allure-results/history

      - name: Run DB migration
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     playgauge_db
          DB_USER:     playgauge_user
          DB_PASSWORD: ci_password
        run: npm run db:migrate

      - name: Run Gauge tests
        env:
          GAUGE_ENV:       ${{ env.GAUGE_ENV }}
          # PLAYGAUGE_ENV is read by EnvLoader to select the correct env file.
          # GAUGE_ENV is unreliable (gauge overrides it to 'default' internally).
          PLAYGAUGE_ENV:   ${{ env.GAUGE_ENV }}
          RUN_ID:          ${{ github.run_id }}
          DB_HOST:         localhost
          DB_PORT:         5432
          DB_NAME:         playgauge_db
          DB_USER:         playgauge_user
          DB_PASSWORD:     ci_password
          DB_ENABLED:      true
          AI_PROVIDER:     ${{ secrets.AI_PROVIDER || 'openai' }}
          AI_API_KEY:      ${{ secrets.AI_API_KEY }}
          # Staging overrides — only needed for environment=staging/dev/prod
          BASE_URL:        ${{ secrets.STAGING_BASE_URL }}
          USERNAME:        ${{ secrets.STAGING_USERNAME }}
          PASSWORD:        ${{ secrets.STAGING_PASSWORD }}
        run: |
          TAGS="${{ github.event.inputs.tags || 'smoke' }}"
          SPECS="${{ github.event.inputs.specs || 'specs/saucedemo/' }}"
          gauge run --tags "$TAGS" "$SPECS"

      - name: Run AI Analyzer
        if: always()
        env:
          RUN_ID:       ${{ github.run_id }}
          DB_HOST:      localhost
          DB_PORT:      5432
          DB_NAME:      playgauge_db
          DB_USER:      playgauge_user
          DB_PASSWORD:  ci_password
          DB_ENABLED:   true
          AI_PROVIDER:  ${{ secrets.AI_PROVIDER || 'openai' }}
          AI_API_KEY:   ${{ secrets.AI_API_KEY }}
        run: npm run ai:analyze || true   # non-fatal

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      # ── Allure Trend: save history so the NEXT CI run can show a trend bar ─
      # Uses a fixed artifact name so the next run's "Restore" step finds it.
      - name: Save Allure history (for next run's Trend)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-report/history/
          retention-days: 90
          overwrite: true        # replace the previous run's copy

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: allure-report/
          retention-days: 30

      - name: Upload AI Analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-${{ github.run_id }}
          path: dist/ai-report/
          retention-days: 30

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: reports/${{ github.run_id }}
